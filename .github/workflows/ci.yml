name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - feature/**

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DB_PROVIDER: sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: npm audit (prod dependencies)
        run: npm audit --audit-level=high --omit=dev

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Print build version
        run: npm run version:print

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  postgres:
    runs-on: ubuntu-latest
    services:
      db-postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: archimap
          POSTGRES_USER: archimap
          POSTGRES_PASSWORD: archimap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archimap -d archimap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DB_PROVIDER: postgres
      DATABASE_URL: postgresql://archimap:archimap@127.0.0.1:5432/archimap
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: PostgreSQL migrations
        run: npm run db:pg:migrate

      - name: PostgreSQL smoke
        run: npm run db:pg:smoke

      - name: PostgreSQL integration
        run: npm run test:integration:postgres

      - name: PostgreSQL smoke runtime
        run: npm run test:smoke
