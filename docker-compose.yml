services:
  archimap:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_SHA: ${BUILD_SHA:-}
        BUILD_DESCRIBE: ${BUILD_DESCRIBE:-}
        BUILD_LATEST_TAG: ${BUILD_LATEST_TAG:-}
    image: ${ARCHIMAP_IMAGE:-streletskiy/archimap:dev}
    container_name: archimap
    restart: unless-stopped
    ports:
      - '${PORT:-3252}:${PORT:-3252}'
    env_file:
      - .env
    environment:
      DB_PROVIDER: ${DB_PROVIDER:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://archimap:archimap@db-postgres:5432/archimap}
      POSTGRES_HOST: ${POSTGRES_HOST:-db-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-archimap}
      POSTGRES_USER: ${POSTGRES_USER:-archimap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archimap}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
      db-postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: archimap-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1000']
    volumes:
      - redis-data:/data

  db-postgres:
    image: imresamu/postgis:16-3.4-bookworm
    container_name: archimap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archimap}
      POSTGRES_USER: ${POSTGRES_USER:-archimap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archimap}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-archimap} -d ${POSTGRES_DB:-archimap}']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  redis-data:
  postgres-data:
