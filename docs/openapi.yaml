openapi: 3.1.0
info:
  title: archimap API
  version: 1.0.0
  description: Core API contract for auth, buildings, search, and system endpoints.
servers:
  - url: http://localhost:3252
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Healthy process
  /readyz:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready
  /metrics:
    get:
      summary: Prometheus-style metrics
      responses:
        '200':
          description: Metrics payload
        '404':
          description: Metrics disabled
  /api/version:
    get:
      summary: Runtime build/version payload
      responses:
        '200':
          description: Version info
  /api/filter-tag-keys:
    get:
      summary: Get cached OSM tag keys for filter UI
      responses:
        '200':
          description: Tag key list
        '500':
          description: Failed to build tag key list
  /api/contours-status:
    get:
      summary: Get total contour count and last update timestamp
      responses:
        '200':
          description: Contour summary
  /api/me:
    get:
      summary: Get authenticated user profile
      responses:
        '200':
          description: Session state
  /api/building/{osmType}/{osmId}:
    get:
      summary: Get building GeoJSON feature by OSM id
      parameters:
        - in: path
          name: osmType
          required: true
          schema:
            type: string
            enum: [way, relation]
        - in: path
          name: osmId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Building feature
        '400':
          description: Invalid identifier
        '404':
          description: Building not found
  /api/building-info/{osmType}/{osmId}:
    get:
      summary: Get merged building information by OSM id
      parameters:
        - in: path
          name: osmType
          required: true
          schema:
            type: string
            enum: [way, relation]
        - in: path
          name: osmId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Building info
        '400':
          description: Invalid identifier
        '404':
          description: Building info not found
  /api/building-info:
    post:
      summary: Submit or update a user building edit
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [osmType, osmId]
              properties:
                osmType:
                  type: string
                  enum: [way, relation]
                osmId:
                  type: integer
                name:
                  type: string
                style:
                  type: string
                levels:
                  type: integer
                yearBuilt:
                  type: integer
                architect:
                  type: string
                address:
                  type: string
                archimapDescription:
                  type: string
                editedFields:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Edit accepted
        '400':
          description: Invalid payload or building identifier
        '401':
          description: Unauthorized
        '403':
          description: Forbidden or CSRF failed
        '409':
          description: No effective changes to submit
  /api/data/regions/{regionId}/pmtiles:
    get:
      summary: Region-specific PMTiles stream
      parameters:
        - in: path
          name: regionId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Full PMTiles payload
        '206':
          description: Partial content for valid byte range
        '400':
          description: Invalid region id
        '404':
          description: Region PMTiles file not found
  /api/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authenticated
        '401':
          description: Invalid credentials
  /api/logout:
    post:
      summary: Logout current session (CSRF required)
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logged out
        '403':
          description: CSRF failed
  /api/register/start:
    post:
      summary: Start registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, acceptTerms, acceptPrivacy]
              properties:
                email:
                  type: string
                password:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                acceptTerms:
                  type: boolean
                acceptPrivacy:
                  type: boolean
      responses:
        '200':
          description: Registration started
        '403':
          description: Registration disabled
        '409':
          description: User already exists
        '429':
          description: Retry later
        '503':
          description: SMTP is not configured
  /api/register/confirm-code:
    post:
      summary: Confirm registration with email code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Registration completed
        '400':
          description: Invalid or expired code
        '403':
          description: Registration disabled
        '409':
          description: User already exists
        '429':
          description: Retry later
  /api/register/confirm-link:
    post:
      summary: Confirm registration with one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Registration completed
        '400':
          description: Invalid or expired token
        '403':
          description: Registration disabled
  /api/password-reset/request:
    post:
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Request accepted
        '503':
          description: SMTP is not configured
  /api/password-reset/confirm:
    post:
      summary: Confirm password reset with one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed
        '400':
          description: Invalid or expired token
        '404':
          description: User not found
  /api/admin/app-settings/data:
    get:
      summary: Get DB-backed data settings summary
      responses:
        '200':
          description: Data settings payload
        '401':
          description: Unauthorized
        '403':
          description: Master admin required
  /api/admin/app-settings/data/regions:
    get:
      summary: List managed data regions
      responses:
        '200':
          description: Region list
    post:
      summary: Create or update a managed data region
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                region:
                  type: object
      responses:
        '200':
          description: Saved region
        '400':
          description: Validation failed
        '403':
          description: Master admin required
  /api/admin/app-settings/data/regions/{regionId}:
    delete:
      summary: Delete a managed data region
      parameters:
        - in: path
          name: regionId
          required: true
          schema:
            type: integer
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Region deleted
        '400':
          description: Invalid region id or region cannot be deleted
        '403':
          description: Master admin required
        '404':
          description: Region not found
  /api/admin/app-settings/data/regions/{regionId}/runs:
    get:
      summary: Get recent sync runs for a region
      parameters:
        - in: path
          name: regionId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Region run history
        '400':
          description: Invalid region id
        '404':
          description: Region not found
  /api/admin/app-settings/data/regions/{regionId}/sync-now:
    post:
      summary: Queue a managed sync run for a region
      parameters:
        - in: path
          name: regionId
          required: true
          schema:
            type: integer
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Region sync queued
        '400':
          description: Invalid region id or region cannot be queued
        '403':
          description: Master admin required
  /api/buildings/filter-data-bbox:
    get:
      summary: Get filter payload for visible bbox
      parameters:
        - in: query
          name: minLon
          required: true
          schema:
            type: number
        - in: query
          name: minLat
          required: true
          schema:
            type: number
        - in: query
          name: maxLon
          required: true
          schema:
            type: number
        - in: query
          name: maxLat
          required: true
          schema:
            type: number
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Filter payload
        '400':
          description: Invalid bbox
  /api/buildings/filter-matches:
    post:
      summary: Match filter rules against bbox
      description: |
        The endpoint accepts a flat `rules[]` array per request.
        Client-side filter layers, priorities, colors, and AND/OR/layer composition are resolved before calling this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bbox, rules]
              properties:
                bbox:
                  type: object
                  properties:
                    west:
                      type: number
                    south:
                      type: number
                    east:
                      type: number
                    north:
                      type: number
                zoom:
                  type: number
                zoomBucket:
                  type: number
                maxResults:
                  type: integer
                rules:
                  type: array
                  description: Flat rule list for one request. Supported operators are `contains`, `equals`, `not_equals`, `starts_with`, `exists`, `not_exists`, `greater_than`, `greater_or_equals`, `less_than`, and `less_or_equals`.
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      op:
                        type: string
                        enum: [contains, equals, not_equals, starts_with, exists, not_exists, greater_than, greater_or_equals, less_than, less_or_equals]
                        description: `exists` and `not_exists` do not require `value`. Numeric operators expect a numeric string in `value`.
                      value:
                        type: string
                        description: Optional for `exists` and `not_exists`.
      responses:
        '200':
          description: Match result
        '400':
          description: Invalid request
        '429':
          description: Rate limited
  /api/search-buildings:
    get:
      summary: Search buildings by text query
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: lon
          schema:
            type: number
        - in: query
          name: lat
          schema:
            type: number
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: cursor
          schema:
            type: integer
      responses:
        '200':
          description: Search result page
        '400':
          description: Invalid query
  /api/account/profile:
    post:
      summary: Update current user profile (CSRF required)
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile updated
        '401':
          description: Unauthorized
        '403':
          description: CSRF failed
  /api/account/change-password:
    post:
      summary: Change current user password (CSRF required)
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Password updated
        '401':
          description: Unauthorized
        '403':
          description: CSRF failed
  /api/admin/app-settings/general:
    get:
      summary: Get general app settings (master admin)
      responses:
        '200':
          description: General settings
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Save general app settings (CSRF, master admin)
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                general:
                  type: object
                  properties:
                    appDisplayName:
                      type: string
                    appBaseUrl:
                      type: string
                    registrationEnabled:
                      type: boolean
                    userEditRequiresPermission:
                      type: boolean
      responses:
        '200':
          description: Saved
        '401':
          description: Unauthorized
        '403':
          description: Forbidden or CSRF failed
  /api/admin/app-settings/smtp:
    get:
      summary: Get SMTP settings (master admin)
      responses:
        '200':
          description: SMTP settings
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Save SMTP settings (CSRF, master admin)
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                smtp:
                  type: object
                  properties:
                    url:
                      type: string
                    host:
                      type: string
                    port:
                      type: integer
                    secure:
                      type: boolean
                    user:
                      type: string
                    pass:
                      type: string
                    from:
                      type: string
                    keepPassword:
                      type: boolean
      responses:
        '200':
          description: Saved
        '401':
          description: Unauthorized
        '403':
          description: Forbidden or CSRF failed
  /api/admin/app-settings/smtp/test:
    post:
      summary: Send SMTP test email with provided settings (CSRF, master admin)
      parameters:
        - in: header
          name: x-csrf-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                smtp:
                  type: object
                  properties:
                    url:
                      type: string
                    host:
                      type: string
                    port:
                      type: integer
                    secure:
                      type: boolean
                    user:
                      type: string
                    pass:
                      type: string
                    from:
                      type: string
                    keepPassword:
                      type: boolean
                testEmail:
                  type: string
      responses:
        '200':
          description: Test email sent
        '400':
          description: Invalid SMTP config
        '401':
          description: Unauthorized
        '403':
          description: Forbidden or CSRF failed
